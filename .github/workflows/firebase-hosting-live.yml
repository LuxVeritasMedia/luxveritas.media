name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-hosting-live
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        id: google-auth
        uses: google-github-actions/auth@v3
        with:
          project_id: lux-veritas-media
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Build static site
        run: node tools/build-static.mjs

      - name: Prepare Hosting artifact
        run: node tools/prepare-hosting.mjs

      - name: QA public buttons
        run: node tools/qa-buttons.mjs

      - name: QA action inventory
        run: node tools/qa-action-inventory.mjs

      - name: QA public site
        run: node tools/qa-public-site.mjs

      - name: QA access model
        run: node tools/qa-access-model.mjs

      - name: QA integrations
        run: node tools/qa-integrations.mjs

      - name: QA integration contract
        run: node tools/qa-integration-contract.mjs

      - name: QA integration profiles
        run: node tools/qa-integration-profiles.mjs

      - name: QA private integration field map
        run: node tools/qa-private-integration-field-map.mjs

      - name: QA private workflow matrix
        run: node tools/qa-private-workflow-matrix.mjs

      - name: QA external workflow targets
        run: node tools/qa-external-workflow-targets.mjs

      - name: QA private workflow selection
        run: node tools/qa-private-workflow-selection.mjs

      - name: QA private integration request
        run: node tools/qa-private-integration-request.mjs

      - name: QA legal review packet
        run: node tools/qa-legal-review-packet.mjs

      - name: QA legal review request
        run: node tools/qa-legal-review-request.mjs

      - name: QA legal sync
        run: node tools/qa-legal-sync.mjs

      - name: QA release handoff
        run: node tools/qa-release-handoff.mjs

      - name: QA launch closeout
        run: node tools/qa-launch-closeout.mjs

      - name: QA launch blockers
        run: node tools/qa-launch-blockers.mjs

      - name: QA MVP status
        run: node tools/qa-mvp-status.mjs

      - name: QA launch evidence
        run: node tools/qa-launch-evidence.mjs

      - name: QA pilot write evidence
        run: node tools/qa-pilot-write-evidence.mjs

      - name: QA media contract
        run: node tools/qa-media-contract.mjs

      - name: QA fan signal
        run: node tools/qa-fan-signal.mjs

      - name: QA workflows
        run: node tools/qa-workflows.mjs

      - name: QA Functions IAM repair request
        run: node tools/qa-functions-iam-repair-request.mjs

      - name: QA mobile layout
        run: node tools/qa-mobile-layout.mjs

      - name: QA accessibility
        run: node tools/qa-accessibility.mjs

      - name: QA Hosting config
        run: node tools/qa-hosting-config.mjs

      - name: QA release readiness
        run: node tools/qa-release-readiness.mjs

      - name: QA domain readiness
        run: node tools/qa-domain-readiness.mjs

      - name: QA provider readiness
        run: node tools/qa-provider-readiness.mjs

      - name: Install browser QA dependencies
        run: |
          npm install --no-save playwright
          npx playwright install chromium

      - name: QA browser flows
        run: node tools/qa-browser-flows.mjs

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@15.22.1 deploy --only hosting --project lux-veritas-media --non-interactive --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ steps.google-auth.outputs.access_token }}

      - name: QA live site
        run: node tools/qa-live-site.mjs

      - name: QA live operator report
        run: node tools/qa-live-operator-report.mjs
        env:
          LUX_REPORT_TOKEN: ${{ secrets.LUX_REPORT_TOKEN }}

      - name: QA live assets
        run: node tools/qa-live-assets.mjs

      - name: QA live media sources
        run: node tools/qa-live-media-sources.mjs

      - name: QA live form matrix
        run: node tools/qa-live-form-matrix.mjs

      - name: QA live event matrix
        run: node tools/qa-live-event-matrix.mjs

      - name: QA live product boundary
        run: node tools/qa-live-product-boundary.mjs

      - name: QA deploy status
        run: node tools/qa-deploy-status.mjs

      - name: QA live browser flows
        run: LUX_BROWSER_BASE_URL=https://luxveritas.media node tools/qa-browser-flows.mjs
