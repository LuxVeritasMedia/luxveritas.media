name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: lux-veritas-media
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build static site
        run: node tools/build-static.mjs

      - name: Prepare Hosting artifact
        run: node tools/prepare-hosting.mjs

      - name: Install Functions dependencies
        run: npm --prefix functions ci

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --project lux-veritas-media --non-interactive

      - name: Deploy Firebase Functions
        run: npx firebase-tools@latest deploy --only functions --project lux-veritas-media --non-interactive --force
