name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-hosting-live
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: lux-veritas-media
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build static site
        run: node tools/build-static.mjs

      - name: Prepare Hosting artifact
        run: node tools/prepare-hosting.mjs

      - name: QA public buttons
        run: node tools/qa-buttons.mjs

      - name: QA public site
        run: node tools/qa-public-site.mjs

      - name: QA access model
        run: node tools/qa-access-model.mjs

      - name: QA integrations
        run: node tools/qa-integrations.mjs

      - name: QA integration contract
        run: node tools/qa-integration-contract.mjs

      - name: QA integration profiles
        run: node tools/qa-integration-profiles.mjs

      - name: QA release handoff
        run: node tools/qa-release-handoff.mjs

      - name: QA media contract
        run: node tools/qa-media-contract.mjs

      - name: QA fan signal
        run: node tools/qa-fan-signal.mjs

      - name: QA workflows
        run: node tools/qa-workflows.mjs

      - name: QA mobile layout
        run: node tools/qa-mobile-layout.mjs

      - name: QA accessibility
        run: node tools/qa-accessibility.mjs

      - name: QA Hosting config
        run: node tools/qa-hosting-config.mjs

      - name: QA release readiness
        run: node tools/qa-release-readiness.mjs

      - name: QA domain readiness
        run: node tools/qa-domain-readiness.mjs

      - name: QA provider readiness
        run: node tools/qa-provider-readiness.mjs

      - name: Install browser QA dependencies
        run: |
          npm install --no-save playwright
          npx playwright install chromium

      - name: QA browser flows
        run: node tools/qa-browser-flows.mjs

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --project lux-veritas-media --non-interactive

      - name: QA live site
        run: node tools/qa-live-site.mjs

      - name: QA live browser flows
        run: LUX_BROWSER_BASE_URL=https://luxveritas.media node tools/qa-browser-flows.mjs
