name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - "functions/**"
      - "firebase.json"
      - ".github/workflows/firebase-functions-manual.yml"
  workflow_dispatch:

concurrency:
  group: firebase-functions
  cancel-in-progress: true

jobs:
  validate-functions:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Functions dependencies
        run: npm --prefix functions ci

      - name: Lint Functions
        run: npm --prefix functions run lint

      - name: QA integrations
        run: node tools/qa-integrations.mjs

      - name: QA integration contract
        run: node tools/qa-integration-contract.mjs

  deploy-functions:
    if: github.event_name == 'workflow_dispatch'
    needs: validate-functions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        id: google-auth
        uses: google-github-actions/auth@v3
        with:
          project_id: lux-veritas-media
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Functions dependencies
        run: npm --prefix functions ci

      - name: Deploy Firebase Functions
        run: npx firebase-tools@15.22.1 deploy --only functions --project lux-veritas-media --non-interactive --force --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ steps.google-auth.outputs.access_token }}

      - name: Set public form relay access
        run: |
          gcloud run services update submitform --region us-central1 --project lux-veritas-media --no-invoker-iam-check
          gcloud run services update tracksiteevent --region us-central1 --project lux-veritas-media --no-invoker-iam-check
          gcloud run services update reportactivity --region us-central1 --project lux-veritas-media --no-invoker-iam-check
          gcloud run services update receiveprivatehandoff --region us-central1 --project lux-veritas-media --no-invoker-iam-check
