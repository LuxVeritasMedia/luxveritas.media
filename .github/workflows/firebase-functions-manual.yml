name: Deploy Firebase Functions

on:
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: lux-veritas-media
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Functions dependencies
        run: npm --prefix functions ci

      - name: Deploy Firebase Functions
        run: npx firebase-tools@latest deploy --only functions --project lux-veritas-media --non-interactive --force

      - name: Set public form relay access
        run: |
          gcloud run services update submitform --region us-central1 --project lux-veritas-media --no-invoker-iam-check
          gcloud run services update tracksiteevent --region us-central1 --project lux-veritas-media --no-invoker-iam-check
