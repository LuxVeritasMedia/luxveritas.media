name: Final Release Audit

on:
  workflow_dispatch:

concurrency:
  group: final-release-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build static site
        run: node tools/build-static.mjs

      - name: Prepare Hosting artifact
        run: node tools/prepare-hosting.mjs

      - name: QA release handoff
        run: node tools/qa-release-handoff.mjs

      - name: QA action inventory
        run: node tools/qa-action-inventory.mjs

      - name: QA launch closeout
        run: node tools/qa-launch-closeout.mjs

      - name: QA legal sync
        run: node tools/qa-legal-sync.mjs

      - name: QA launch blockers
        run: node tools/qa-launch-blockers.mjs

      - name: QA MVP status
        run: node tools/qa-mvp-status.mjs

      - name: QA launch evidence
        run: node tools/qa-launch-evidence.mjs

      - name: QA live media sources
        run: node tools/qa-live-media-sources.mjs

      - name: QA private integration field map
        run: node tools/qa-private-integration-field-map.mjs

      - name: QA private workflow matrix
        run: node tools/qa-private-workflow-matrix.mjs

      - name: QA external workflow targets
        run: node tools/qa-external-workflow-targets.mjs

      - name: QA private integration request
        run: node tools/qa-private-integration-request.mjs

      - name: QA workflows
        run: node tools/qa-workflows.mjs

      - name: Final release gate audit
        run: LUX_FINAL_ALLOW_BLOCKERS=1 LUX_FINAL_SKIP_BROWSER=1 LUX_FINAL_SKIP_LIVE=1 node tools/qa-final-release-gate.mjs
